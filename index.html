    <style>
      @font-face {
  font-family: Tiny; /* set name */
  src: url(otf/TINY5x3-140.otf); /* url of the font */
}
        body{               
            cursor: url('images/hands.png'), auto;
            font-family:Tiny;
            text-align: center;
           /*https://www.w3schools.com/css/css_overflow.asp*/
            overflow: hidden;
            margin: 0;

            background-color: lightpink;
            color: lightgreen;

        
        } 
.ladies {
padding: 250px;
}

    height: max-content;
}
p{
  font-size: 25px;
}
    /*https://www.reddit.com/r/css/comments/166hzop/how_to_change_the_cursor_when_hovering_over*/
.flying-gull2 {
    position: absolute;
    width: 250px;
    animation: fly2 18s linear infinite; 
    cursor: url('images/grab.png'), auto;
}
.flying-gull3 {
    position: absolute;
    width: 250px;
    animation: fly3 17s linear infinite;
    cursor: url('images/grab.png'), auto; 
}
.flying-gull4 {
    position: absolute;
    width: 250px;
    animation: fly4 16s linear infinite;
    cursor: url('images/grab.png'), auto; 
}
.flying-gull5 {
    position: absolute;
    width: 250px;
    animation: fly5 16s linear infinite;
    cursor: url('images/grab.png'), auto; 
}
.flying-gull6 {
    position: absolute;
    width: 250px;
    animation: fly6 16s linear infinite;
    cursor: url('images/grab.png'), auto; 
}
.flying-me {
    position:absolute ;
    width: 200px;
    animation: fly7 100s linear infinite;
    cursor: url('images/grab.png'), auto;
}

/* code for flying PNG was created through using code snippets (later altered) from the following sites: 
https://wicky.co/make-an-image-fly-across-the-screen/#:~:text=Part%201%20CSS%20Code:,ShowHideDiv(this)%22%20/%3E
*/

@keyframes fly2 {
  0% { top: 100%; left: 100%; }
  50% { top: 20%; left: 20%}
  100% { top: 70%; left: 100%; }
}
@keyframes fly3 {
  0% { top: 50%; left: 120%;}
  50% { top: 10%; left: 30%;}
  100% { top: 30%; left:-10%;}
}
@keyframes fly4 {
  0% { top: 90%; left: 50%; }
  50% { top: 40%; left: 80%}
  100% { top: -10%; left:20%; }
}
@keyframes fly5 {
  0% { top: 50%; left: -10%; }
  50% { top: 50%; left: 50%}
  100% { top: -10%; left: 110%; }
}
@keyframes fly6 {
  0% { top: 10%; left: 5%; }
  100% { top: 0%; left: 100%; }
}
@keyframes fly7 {
  0% { top: 105%; left: -60%; }
  25% { top: 5%; left: 140%;}
  50% { top: 45%; left: -10%;}
  75% { top: 80%; left: 30%;}
  100% { top: 110%; left: -50%;}
}
/* https://www.w3schools.com/howto/howto_css_fixed_footer.asp*/
.footer {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  text-align: center;
}
h1{
  font-size: 100px;
}

</style>
